<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🏡 House Price Prediction</h1>

    <form action="/predict" method="POST">

        <div>
            <label for="area">Area (sq ft)</label>
            <input type="number" id="area" name="area" step="0.01" required>
        </div>

        <div>
            <label for="bedrooms">Bedrooms</label>
            <input type="number" id="bedrooms" name="bedrooms" min="0" required>
        </div>

        <div>
            <label for="bathrooms">Bathrooms</label>
            <input type="number" id="bathrooms" name="bathrooms" min="0" required>
        </div>

        <div>
            <label for="stories">Stories</label>
            <input type="number" id="stories" name="stories" min="0" required>
        </div>

        <div>
            <label for="mainroad">Main Road</label>
            <select id="mainroad" name="mainroad">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div>
            <label for="guestroom">Guest Room</label>
            <select id="guestroom" name="guestroom">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div>
            <label for="basement">Basement</label>
            <select id="basement" name="basement">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div>
            <label for="hotwaterheating">Hot Water Heating</label>
            <select id="hotwaterheating" name="hotwaterheating">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div>
            <label for="airconditioning">Air Conditioning</label>
            <select id="airconditioning" name="airconditioning">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div>
            <label for="parking">Parking Spaces</label>
            <input type="number" id="parking" name="parking" min="0" required>
        </div>

        <div>
            <label for="prefarea">Preferred Area</label>
            <select id="prefarea" name="prefarea">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div>
            <label for="furnishingstatus">Furnishing Status</label>
            <select id="furnishingstatus" name="furnishingstatus">
                <option value="furnished">Furnished</option>
                <option value="semi-furnished">Semi-Furnished</option>
                <option value="unfurnished">Unfurnished</option>
            </select>
        </div>

        <div class="button">
            <input type="submit" value="Predict House Price">
        </div>

    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

</div>

</body>
</html>
